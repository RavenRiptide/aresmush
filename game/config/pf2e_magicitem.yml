    shortdesc: "This mummified elf hand hangs on a golden chain, its gnarled fingers locked in a peculiar pattern.%r%r*Activate* (two-actions) command, envision; *Effect* You cast _mage hand_."
  Hat of Disguise: 
    traits:
      - illusion
      - invested
      - magical
    level: 2
    price: 3000
    bulk: 0
    use: 
      disguise:
        use_descr: Casts a 1st-level _illusory disguise_ on the wearer.
        frequency: 1/day
    shortdesc: "This ordinary-looking hat allows you to cloak yourself in illusions.%r%r*Activate* 1 minute (Interact); *Frequency* once per day; *Effect* The hat casts a 1st-level _illusory disguise_ spell on you. While setting up the disguise, you can magically alter the hat to appear as a comb, ribbon, helm, or other piece of headwear."
  Wayfinder: 
    traits:
      - uncommon
      - evocation
      - invested
      - magical
    level: 2
    price: 2800
    bulk: 0
    shortdesc: "This compact compass repurposes ancient technology to draw fantastic powers from the mysterious magical items called _aeon stones_. It serves as a status symbol among adventurers of any stripe. A _wayfinder_ functions as a compass.%r%rAn indentation in the middle of the wayfinder can hold a single aeon stone. Placing an aeon stone in this indentation provides you all the benefits of having the _aeon stone_ orbiting your head, but it protects the stone from being noticed or stolen as easily. You invest a _wayfinder_ and the aeon stone within it simultaneously, and they count as only one item toward your investiture limit. An invested aeon stone slotted in a _wayfinder_ also grants its resonant power.%r%rIf you have more than one _wayfinder_ with an invested aeon stone on your person at a given time, destructive interference from their resonance prevents you from gaining benefits from any of them. You can still benefit from additional _aeon stones_ orbiting your head, just not in _wayfinders_.%r%r*Activate* (one-action) command; *Effect* The _wayfinder_ is targeted by a 1st-level _light_ spell."
