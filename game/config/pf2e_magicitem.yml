# Level 1 Magic Items
  Aeon Stone (Dull Gray): 
    traits:
      - invested
      - magical
      - transmutation
      - uncommon
    level: 1
    price: 900
    bulk: 0
    shortdesc: "A _dull gray_ aeon stone has lost its special magical properties, sometimes as a result of overusing a _tourmaline sphere_ or _pale lavender ellipsoid aeon stone_. It still orbits your head like any other aeon stone and can thus serve as a stylish, hands-free option for various spells that target an object, like _continual flame_."
