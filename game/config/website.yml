    wiki_create:
      type: portal
      message: Created a wiki page.
    wiki_edit:
      type: portal
      message: Edited a wiki page.
  allow_html_in_markdown: true
  auto_wiki_export: true
  character_gallery_group: Region
  character_gallery_subgroup: ''
  hide_searchbox: true
  left_sidebar: false
  max_folder_size_kb: 2000
  max_upload_size_kb: 300
  permissions:
    manage_theme: Edit web portal CSS and colors.
    manage_wiki: Create and delete restricted wiki pages.
  restricted_pages:
  - home
  - policy:*
  - theme:*
  - mechanics:*
  - plots:*
  - organization:*
  - resource:*
  - rules:*
  shortcuts:
